<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Drone Mission Planner</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root { --bg: #0b1220; --panel: #0f172a; --line: #1e293b; --text: #e2e8f0;
            --muted: #94a3b8; --accent: #f59e0b; --blue: #3b82f6; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.4 system-ui, sans-serif; display: flex; height: 100vh;
           width: 100vw; background: var(--bg); color: var(--text); }
    #side { width: 340px; flex: none; padding: 18px; overflow-y: auto; background: var(--panel);
            border-right: 1px solid var(--line); display: flex; flex-direction: column; gap: 14px; }
    #map { flex: 1; }
    h1 { font-size: 18px; margin: 0; font-weight: 650; letter-spacing: .2px; }
    h1 small { display: block; font-size: 11px; font-weight: 400; color: var(--muted);
               letter-spacing: 0; margin-top: 2px; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    button { padding: 8px 12px; border: 1px solid var(--line); border-radius: 8px; cursor: pointer;
             background: #1e293b; color: var(--text); font: inherit; transition: .12s; }
    button:hover:not(:disabled) { background: #273449; border-color: #334155; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button.primary { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }
    button.primary:hover { background: #2f6fe0; }
    #signin { background: #fff; color: #1f2937; border-color: #fff; font-weight: 600; }
    input, select { padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px;
                    background: #0b1220; color: var(--text); font: inherit; }
    input[type=text], #mname { flex: 1; min-width: 0; }
    input[type=file] { width: 100%; border-style: dashed; padding: 14px; cursor: pointer; }
    #auth { font-size: 12px; color: var(--muted); width: 100%; }
    #routelink { color: var(--accent); font-weight: 600; text-decoration: none; font-size: 13px; }
    #routelink:hover { text-decoration: underline; }
    #list { display: flex; flex-direction: column; gap: 8px; }
    .zone { padding: 10px 12px; background: #0b1220; border: 1px solid var(--line); border-radius: 10px; }
    .zone b { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-weight: 600; }
    .zone a { font-size: 12px; color: var(--blue); text-decoration: none; margin-right: 10px; }
    .zone a:hover { text-decoration: underline; }
    .num { display: inline-flex; width: 22px; height: 22px; flex: none; align-items: center;
           justify-content: center; background: var(--accent); color: #1f2937; border-radius: 50%;
           font-size: 12px; font-weight: 700; }
    .leaflet-marker-icon.num-icon { background: var(--accent); color: #1f2937; border-radius: 50%;
      text-align: center; font-weight: 700; line-height: 26px; box-shadow: 0 1px 4px rgba(0,0,0,.5);
      border: 2px solid #fff; }
    .leaflet-container { background: #0b1220; }
  </style>
</head>
<body>
  <div id="side">
    <h1>🛰️ Drone Mission Planner<small>Upload KML/KMZ · plan the scan route · navigate</small></h1>
    <div class="row">
      <button id="signin">Sign in with Google</button>
      <div id="auth"></div>
    </div>
    <div class="row">
      <input id="files" type="file" accept=".kml,.kmz" multiple />
    </div>
    <div class="row">
      <button id="ptmode">📍 Pin: Center</button>
    </div>
    <div class="row">
      <button id="plan" class="primary">Plan route</button>
      <a id="routelink" href="#" target="_blank" rel="noopener" style="display:none">▶ Full route in Google Maps</a>
    </div>
    <div class="row">
      <input id="mname" placeholder="mission name" />
      <button id="save" disabled>Save to Drive</button>
    </div>
    <div class="row">
      <button id="load" disabled>Load missions…</button>
      <select id="missions" style="display:none"></select>
    </div>
    <div id="list"></div>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
