<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Drone Mission Planner</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <style>
    /* NEXUS glass theme: deep-blue steel, frosted panels, chrome/electric-blue accents */
    :root { --bg: #04070a; --bg2: #0a1519; --panel: rgba(9,18,22,.72); --line: rgba(0,229,255,.22);
            --text: #d6f7fd; --muted: #6f929b; --accent: #00e5ff; --blue: #00c8d8;
            --glass: rgba(0,229,255,.05); --glass-hi: rgba(0,229,255,.16);
            --glow: 0 0 16px rgba(0,229,255,.5); }
    * { box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
    /* position:fixed is the only reliable page-scroll lock on iOS Safari (overflow:hidden isn't). */
    body { margin: 0; font: 14px/1.4 system-ui, sans-serif; display: flex; flex-direction: row-reverse;
           position: fixed; inset: 0; height: 100dvh; width: 100%; color: var(--text);
           background: radial-gradient(120% 80% at 50% -10%, #0a1c22 0%, #060f14 45%, var(--bg) 100%); }
    #side { width: 340px; flex: none; padding: 18px; overflow-y: auto; background: var(--panel);
            backdrop-filter: blur(18px) saturate(140%); -webkit-backdrop-filter: blur(18px) saturate(140%);
            border-left: 1px solid var(--line); box-shadow: -1px 0 0 rgba(255,255,255,.06) inset;
            display: flex; flex-direction: column; gap: 14px; }
    #map { flex: 1; position: relative; }
    h1 { font-size: 18px; margin: 0; font-weight: 650; letter-spacing: .2px;
         color: var(--accent); text-shadow: var(--glow); }
    h1 .drone { vertical-align: -4px; margin-right: 6px; }
    h1 small { display: block; font-size: 11px; font-weight: 400; color: var(--muted);
               letter-spacing: 0; margin-top: 2px; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    button { padding: 8px 12px; border: 1px solid var(--glass-hi); border-radius: 10px; cursor: pointer;
             background: var(--glass); color: var(--text); font: inherit; transition: .15s;
             backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
    button:hover:not(:disabled) { background: rgba(255,255,255,.12); border-color: rgba(150,190,255,.4); }
    button:active:not(:disabled), .upload-btn:active {
      box-shadow: var(--glow); border-color: var(--accent); transform: translateY(1px); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button.primary { background: linear-gradient(180deg, #22f0ff, #00c8d8); border-color: #6ffcff;
                     color: #022027; font-weight: 700; box-shadow: var(--glow); border-radius: 999px; }
    button.primary:hover { background: linear-gradient(180deg, #5cf7ff, #00e5ff); }
    .drone { width: 22px; height: 22px; flex: none; filter: drop-shadow(var(--glow)); }
    .gate-card .drone { width: 64px; height: 64px; }
    #signin { background: #fff; color: #1f2937; border-color: #fff; font-weight: 600; }
    input, select { padding: 8px 10px; border: 1px solid var(--glass-hi); border-radius: 10px;
                    background: rgba(30,42,70,.5); color: var(--text); font: inherit; }
    input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: var(--glow); }
    input[type=text], #mname { flex: 1; min-width: 0; }
    /* load-missions row: the list takes the slack, Save and 🗑 keep their size.
       align-self:stretch because a select renders 1px shorter than a button. */
    #missions { flex: 1; min-width: 0; align-self: stretch; }
    #save, #delmission { flex: none; }
    .upload-btn { width: 100%; text-align: center; padding: 14px; border: 1px dashed rgba(150,190,255,.35);
                  border-radius: 12px; cursor: pointer; color: var(--muted); background: rgba(255,255,255,.03); }
    .upload-btn:hover { background: var(--glass); color: var(--text); border-color: var(--accent); }
    .navico { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px;
              border: 1px solid var(--line); border-radius: 8px; margin-right: 6px; background: var(--glass); }
    .navico:hover { background: rgba(255,255,255,.12); }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-label { font-size: 12px; font-weight: 600; color: var(--muted); }
    .switchrow { gap: 10px; }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; flex: none; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .slider { position: absolute; inset: 0; background: rgba(120,140,175,.45); border-radius: 999px; transition: .15s; }
    .switch .slider::before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px;
      background: #fff; border-radius: 50%; transition: .15s; }
    .switch input:checked + .slider { background: var(--blue); }
    .switch input:checked + .slider::before { transform: translateX(20px); }
    /* ---- map tool bar: frosted pill over the map (Fit / POI / Edit / Clear + driving) ----
       Hidden checkbox holds toggle state, the label is the button — same trick the old
       .tbtn row used, so #roi and #editverts keep their existing onchange handlers. */
    #mapbar { position: absolute; left: 10px; right: 10px; bottom: 10px; z-index: 6;
      display: flex; align-items: center; justify-content: center; gap: 4px; padding: 5px; border-radius: 999px;
      background: rgba(6,13,17,.72); border: 1px solid var(--glass-hi);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .mapbtn { width: 44px; height: 44px; flex: none; padding: 0; border: 0; border-radius: 50%;
      background: transparent; color: var(--text); cursor: pointer; transition: .15s;
      display: flex; align-items: center; justify-content: center; }
    .mapbtn svg { width: 20px; height: 20px; fill: none; stroke: currentColor;
      stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
    .mapbtn:hover { background: var(--glass-hi); }
    .mapbtn:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
    .mb-cb:checked + .mapbtn { background: var(--blue); color: #04070a; box-shadow: var(--glow); }
    .mapbtn.danger { color: #ff9f97; }
    /* phone-only bar icons (upload / load / save) — desktop keeps them in the side menu */
    .phonebtn { display: none; }
    /* load icon: the real #missions select is moved in here by JS and laid over the icon at
       opacity 0, so the native picker opens on tap and the existing onchange still fires. */
    #loadslot { position: relative; overflow: hidden; }
    #loadslot select { position: absolute; inset: 0; width: 100%; height: 100%;
      opacity: 0; border: 0; padding: 0; }
    body.driving #editctrls { display: none; }
    /* vertex tools: second pill, stacked directly above the bar */
    #editctrls { position: absolute; left: 10px; bottom: 68px; z-index: 6;
      width: max-content; max-width: calc(100% - 20px);
      display: flex; align-items: center; gap: 4px; padding: 5px; border-radius: 999px;
      background: rgba(6,13,17,.72); border: 1px solid var(--glass-hi);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    #editnote { padding: 0 12px; font-size: 12px; color: var(--muted); }
    #edittools { display: flex; align-items: center; gap: 4px; }
    /* ROI distance chip: solid dark background, colored text+border (currentColor set in JS) */
    .dist-chip { padding: 3px 9px; border-radius: 8px; background: #04070a; border: 1px solid currentColor;
                 font-size: 13px; font-weight: 700; white-space: nowrap; pointer-events: none; box-shadow: var(--glow); }
    #auth { font-size: 12px; color: var(--muted); width: 100%; }
    #routelink { color: var(--accent); font-weight: 600; text-decoration: none; font-size: 13px; }
    #routelink:hover { text-decoration: underline; }
    #list { display: flex; flex-direction: column; gap: 8px; }
    .zone { padding: 10px 12px; background: var(--glass); border: 1px solid var(--glass-hi); border-radius: 12px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); cursor: pointer; transition: .15s;
            box-shadow: 0 1px 0 rgba(255,255,255,.08) inset; }
    .zone:active { box-shadow: var(--glow); border-color: var(--accent); transform: translateY(1px); }
    .zone b { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-weight: 600; cursor: pointer; }
    .donebox { flex: none; width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
    .zone.done b { opacity: .55; text-decoration: line-through; }
    .zone a { font-size: 12px; color: var(--blue); text-decoration: none; margin-right: 10px; }
    .zone a:hover { text-decoration: underline; }
    .num { display: inline-flex; width: 22px; height: 22px; flex: none; align-items: center;
           justify-content: center; background: var(--accent); color: #1f2937; border-radius: 50%;
           font-size: 12px; font-weight: 700; }
    .num-icon { width: 26px; height: 26px; background: var(--accent); color: #1f2937; border-radius: 50%;
      text-align: center; font-weight: 700; line-height: 26px; box-shadow: 0 1px 4px rgba(0,0,0,.5);
      border: 2px solid #fff; cursor: pointer; }
    #map { background: var(--bg); }
    .hint { font-size: 12px; color: var(--muted); margin: 0; }
    .maplibregl-popup-content { background: var(--panel); color: var(--text); border: 1px solid var(--line);
      border-radius: 8px; box-shadow: var(--glow); padding: 7px 10px;
      display: flex; align-items: center; gap: 8px; }
    .maplibregl-popup-tip { display: none; }
    /* coordinate box: pinned to the top of the map instead of hovering over the pin */
    #coordbox { display: none; position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      z-index: 6; background: var(--panel); color: var(--text); border: 1px solid var(--line);
      border-radius: 8px; box-shadow: var(--glow); padding: 7px 10px; align-items: center; gap: 8px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); max-width: calc(100% - 20px); }
    .coordtxt { color: var(--accent); font-weight: 600; white-space: nowrap; }
    .copybtn { padding: 3px 9px; font-size: 12px; border: 1px solid var(--blue); background: var(--blue);
      color: #071528; border-radius: 6px; cursor: pointer; font-weight: 700; }
    .copybtn:hover { background: #5cf7ff; }
    /* map controls: dark glass shell with cyan frame + glow, to match the panels.
       Also keeps the app's global button theme (padding/radius/border) off them. */
    .maplibregl-ctrl-group, .maplibregl-ctrl-group:not(:empty) { background: rgba(6,13,17,.92);
      border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--glow); overflow: hidden; }
    .maplibregl-ctrl button { width: 30px; height: 30px; padding: 0; border: 0; border-radius: 0; background: transparent; }
    .maplibregl-ctrl-group button + button { border-top: 1px solid var(--line); }
    .maplibregl-ctrl-group button:hover:not(:disabled) { background: var(--glass-hi); border-color: transparent; }
    /* tint maplibre's dark icons to the neon-cyan accent for contrast + theme match */
    .maplibregl-ctrl-icon { filter: invert(72%) sepia(99%) saturate(1752%) hue-rotate(151deg) brightness(101%) contrast(101%); }
    #gate { position: fixed; inset: 0; z-index: 3000; display: flex; align-items: center;
            justify-content: center; background: var(--bg); }
    /* ref look: dark card, clean even cyan glow, neon icon, cyan pill CTA */
    .gate-card { position: relative; border: 1px solid rgba(0,229,255,.2); border-radius: 16px; background: #0a0e11;
                 box-shadow: 0 0 34px rgba(0,229,255,.14), 0 24px 60px rgba(0,0,0,.6); }
    .gate-card h1 { color: var(--accent); text-shadow: 0 0 16px rgba(0,229,255,.5); }
    .gate-card #signin { background: linear-gradient(180deg, #22f0ff, #00c8d8); color: #022027;
      border: 1px solid #6ffcff; border-radius: 999px; box-shadow: var(--glow); font-weight: 700; }
    .gate-card #signin:hover { background: linear-gradient(180deg, #5cf7ff, #00e5ff); }
    .gate-card { text-align: center; max-width: 360px; padding: 40px 24px; }
    .gate-card .logo { font-size: 56px; line-height: 1; }
    .gate-card h1 { font-size: 26px; margin: 16px 0 10px; font-weight: 650; }
    .gate-card p { color: var(--muted); margin: 0 0 26px; }
    .gate-card #signin { font-size: 15px; padding: 12px 24px; }
    .gate-card .note { font-size: 12px; margin: 20px 0 0; }
    /* desktop: wrappers are invisible — children flow in the side column as before */
    .sec { display: contents; }
    #grab { display: none; }                        /* phone-only: drag the map/menu split */
    @media (max-width: 640px) {
      #grab { display: flex; align-items: center; justify-content: center; flex: none; height: 16px;
        background: var(--panel); border-top: 1px solid var(--line); touch-action: none; cursor: row-resize; }
      #grab::before { content: ''; width: 44px; height: 4px; border-radius: 999px; background: var(--glass-hi); }
      body.grabbing #map { transition: none; }      /* the .45s ease would lag behind the finger */
      body.driving #grab { display: none; }
      body { flex-direction: column-reverse; }      /* map on top, panel below */
      #map { flex: none; height: var(--maph, 56dvh); min-height: 0;
             transition: height .45s cubic-bezier(.22,.61,.36,1); } /* driving on/off slides the menu */
      .phonebtn { display: flex; }
      #side {                                       /* panel = horizontal pager */
        width: 100%; flex: 1; height: auto; min-height: 0; padding: 0; gap: 0;
        flex-direction: row; overflow-x: auto; overflow-y: hidden;
        scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        border-left: none; border-top: 1px solid var(--line);
      }
      .sec {                                          /* each = one full-width swipe page */
        display: flex; flex-direction: column; gap: 14px;
        flex: 0 0 100%; min-width: 0; padding: 16px; overflow-y: auto;
        scroll-snap-align: start; border-right: 1px solid var(--line);
      }
    }
    /* ---- driving mode: transparent overlay, corner wheel, drum picker (mobile) ---- */
    #driveoverlay { display: none; }
    /* entering driving: the map grows to full height, sliding the menu off the bottom
       (it stays in flow below the fold so the exit transition slides it back up) */
    body.driving #map { height: 100dvh; }
    /* bottom:66px lifts the drum + nav clear of the tool bar, which keeps its default
       bottom:10px and so sits under them. ponytail: 66 = the bar's 56px height + 10px
       offset; re-tune only if .mapbtn changes size. */
    body.driving #driveoverlay { display: block; position: absolute; left: 0; right: 0; bottom: 66px; z-index: 6;
      padding: 12px 16px 14px; background: linear-gradient(180deg, transparent, rgba(4,7,10,.55) 40%); }
    #drivepickwrap { position: relative; height: 132px; }
    #drivepickwrap::before { content: ''; position: absolute; left: 0; right: 0; height: 44px; top: 50%;
      transform: translateY(-50%); border-top: 1px solid var(--glass-hi); border-bottom: 1px solid var(--glass-hi);
      background: rgba(0,229,255,.06); pointer-events: none; }
    #drivepicker { height: 132px; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none;
      -webkit-mask-image: linear-gradient(180deg, transparent, #000 32%, #000 68%, transparent);
      mask-image: linear-gradient(180deg, transparent, #000 32%, #000 68%, transparent); }
    #drivepicker::-webkit-scrollbar { display: none; }
    #drivepicker .spacer { height: 44px; }
    #drivepicker .opt { height: 44px; scroll-snap-align: center; display: flex; align-items: center; gap: 12px;
      justify-content: flex-end; padding: 0 6px; will-change: transform; }
    #drivepicker .opt .on { font-size: 18px; font-weight: 600; white-space: nowrap; }
    #drivepicker .opt .oi { width: 26px; height: 26px; flex: none; border-radius: 50%; background: var(--accent);
      color: #04070a; font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    #drivepicker .opt.cur .on { color: var(--accent); text-shadow: var(--glow); }
    #drivenav { display: flex; gap: 10px; margin-top: 6px; }
    #drivenav a { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px;
      border-radius: 12px; border: 1px solid var(--glass-hi); background: rgba(6,13,17,.5); color: var(--text);
      font-weight: 600; font-size: 14px; text-decoration: none; }
    #drivenav a svg { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <div id="gate">
    <div class="gate-card">
      <svg class="drone" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round"><circle cx="5" cy="5" r="2.2"/><circle cx="19" cy="5" r="2.2"/><circle cx="5" cy="19" r="2.2"/><circle cx="19" cy="19" r="2.2"/><path d="M6.6 6.6 9.5 9.5M17.4 6.6 14.5 9.5M6.6 17.4 9.5 14.5M17.4 17.4 14.5 14.5"/><rect x="9.3" y="9.3" width="5.4" height="5.4" rx="1.2"/></svg>
      <h1>Drone Mission Planner</h1>
      <button id="signin">Sign in with Google</button>
    </div>
  </div>
  <div id="side">
    <div class="sec">
      <div class="row">
        <input id="files" type="file" accept=".kml,.kmz" multiple hidden />
        <label for="files" class="upload-btn">⬆ Upload KML / KMZ</label>
      </div>
      <div class="field">
        <label class="field-label" for="mname">Mission</label>
        <div class="row">
          <input id="mname" placeholder="mission name" />
        </div>
        <div class="row" style="flex-wrap:nowrap">
          <select id="missions" style="display:none"></select>
          <button id="delmission" title="Delete selected mission" style="display:none">🗑</button>
          <button id="save" class="primary" disabled>Save</button>
        </div>
      </div>
      <a id="routelink" href="#" target="_blank" rel="noopener" style="display:none">▶ Full route in Google Maps</a>
      <div id="list"></div>
    </div>
  </div>
  <div id="grab" aria-label="Drag to resize the map"></div>
  <div id="map"><div id="roi-note" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5; background:#04070aee; color:#00e5ff; border:1px solid #00e5ff; border-radius:8px; padding:12px 20px; font-size:16px; pointer-events:none; transition:opacity .4s">Please select a polygon</div>
    <div id="coordbox"></div>
    <!-- vertex tools: second pill above the bar, shown only while Edit is on -->
    <div id="editctrls" style="display:none">
      <div id="editnote" style="display:none">Select a polygon</div>
      <div id="edittools" style="display:none">
        <button id="vadd" class="mapbtn" title="Add vertex" aria-label="Add vertex"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
        <button id="vdel" class="mapbtn" title="Remove vertex" aria-label="Remove vertex"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
        <button id="vreset" class="mapbtn" title="Reset polygon" aria-label="Reset polygon"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg></button>
        <input type="checkbox" id="origtoggle" class="mb-cb" checked hidden />
        <label class="mapbtn" for="origtoggle" title="Show original outline" aria-label="Show original outline"><svg viewBox="0 0 24 24"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></label>
      </div>
    </div>
    <!-- map tool bar: Upload / Load / Save (phone only) + Fit / POI / Edit / Clear -->
    <div id="mapbar">
      <label for="files" class="mapbtn phonebtn" title="Upload KML / KMZ" aria-label="Upload KML or KMZ"><svg viewBox="0 0 24 24"><path d="M12 16V4"/><path d="M7.5 8.5 12 4l4.5 4.5"/><path d="M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3"/></svg></label>
      <span id="loadslot" class="mapbtn phonebtn" title="Load mission" aria-label="Load mission"><svg viewBox="0 0 24 24"><path d="M3 7a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/></svg></span>
      <button id="savebtn" class="mapbtn phonebtn" title="Save mission" aria-label="Save mission"><svg viewBox="0 0 24 24"><path d="M5 4h11l3 3v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/><path d="M8 4v5h7V4"/><path d="M8 14h8v7H8z"/></svg></button>
      <button id="fit" class="mapbtn" title="Fit all zones" aria-label="Fit all zones"><svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>
      <input type="checkbox" id="roi" class="mb-cb" hidden />
      <label class="mapbtn" for="roi" title="POI — frame live location with the target" aria-label="POI"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg></label>
      <input type="checkbox" id="editverts" class="mb-cb" hidden />
      <label class="mapbtn" for="editverts" title="Edit polygon vertices" aria-label="Edit polygon vertices"><svg viewBox="0 0 24 24"><path d="M5 7l7-3 7 3-2 10-5 3-5-3z"/><circle cx="5" cy="7" r="1.6"/><circle cx="19" cy="7" r="1.6"/><circle cx="12" cy="20" r="1.6"/></svg></label>
      <button id="clear" class="mapbtn danger" title="Clear all zones" aria-label="Clear all zones"><svg viewBox="0 0 24 24"><path d="M20 4 10.6 12.4"/><path d="M9.4 11.4 12.6 14.6 11 18.7 5.3 13Z"/><path d="M11 13 8.2 15.8"/></svg></button>
    </div>
    <div id="driveoverlay">
      <div id="drivepickwrap"><div id="drivepicker"></div></div>
      <div id="drivenav">
        <a id="drivemaps" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path fill="#ea4335" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>Maps</a>
        <a id="drivewaze" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path fill="#33ccff" d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>Waze</a>
      </div>
    </div></div>

  <script src="https://accounts.google.com/gsi/client" async></script>
  <!-- cache-bust: GitHub Pages caches app.js/geo.js for 10 min; always load the
       latest so pushes show up without a manual hard-refresh. -->
  <script type="module">import(`./app.js?v=${Date.now()}`);</script>
</body>
</html>
