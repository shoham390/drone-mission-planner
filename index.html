<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Drone Mission Planner</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <style>
    /* NEXUS glass theme: deep-blue steel, frosted panels, chrome/electric-blue accents */
    :root { --bg: #04070a; --bg2: #0a1519; --panel: rgba(9,18,22,.72); --line: rgba(0,229,255,.22);
            --text: #d6f7fd; --muted: #6f929b; --accent: #00e5ff; --blue: #00c8d8;
            --glass: rgba(0,229,255,.05); --glass-hi: rgba(0,229,255,.16);
            --glow: 0 0 16px rgba(0,229,255,.5); }
    * { box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
    /* position:fixed is the only reliable page-scroll lock on iOS Safari (overflow:hidden isn't). */
    body { margin: 0; font: 14px/1.4 system-ui, sans-serif; display: flex; flex-direction: row-reverse;
           position: fixed; inset: 0; height: 100dvh; width: 100%; color: var(--text);
           background: radial-gradient(120% 80% at 50% -10%, #0a1c22 0%, #060f14 45%, var(--bg) 100%); }
    #side { width: 340px; flex: none; padding: 18px; overflow-y: auto; background: var(--panel);
            backdrop-filter: blur(18px) saturate(140%); -webkit-backdrop-filter: blur(18px) saturate(140%);
            border-left: 1px solid var(--line); box-shadow: -1px 0 0 rgba(255,255,255,.06) inset;
            display: flex; flex-direction: column; gap: 14px; }
    #map { flex: 1; }
    h1 { font-size: 18px; margin: 0; font-weight: 650; letter-spacing: .2px;
         color: var(--accent); text-shadow: var(--glow); }
    h1 .drone { vertical-align: -4px; margin-right: 6px; }
    h1 small { display: block; font-size: 11px; font-weight: 400; color: var(--muted);
               letter-spacing: 0; margin-top: 2px; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    button { padding: 8px 12px; border: 1px solid var(--glass-hi); border-radius: 10px; cursor: pointer;
             background: var(--glass); color: var(--text); font: inherit; transition: .15s;
             backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
    button:hover:not(:disabled) { background: rgba(255,255,255,.12); border-color: rgba(150,190,255,.4); }
    button:active:not(:disabled), .upload-btn:active {
      box-shadow: var(--glow); border-color: var(--accent); transform: translateY(1px); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button.primary { background: linear-gradient(180deg, #22f0ff, #00c8d8); border-color: #6ffcff;
                     color: #022027; font-weight: 700; box-shadow: var(--glow); border-radius: 999px; }
    button.primary:hover { background: linear-gradient(180deg, #5cf7ff, #00e5ff); }
    .drone { width: 22px; height: 22px; flex: none; filter: drop-shadow(var(--glow)); }
    .gate-card .drone { width: 64px; height: 64px; }
    #signin { background: #fff; color: #1f2937; border-color: #fff; font-weight: 600; }
    input, select { padding: 8px 10px; border: 1px solid var(--glass-hi); border-radius: 10px;
                    background: rgba(30,42,70,.5); color: var(--text); font: inherit; }
    input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: var(--glow); }
    input[type=text], #mname { flex: 1; min-width: 0; }
    .upload-btn { width: 100%; text-align: center; padding: 14px; border: 1px dashed rgba(150,190,255,.35);
                  border-radius: 12px; cursor: pointer; color: var(--muted); background: rgba(255,255,255,.03); }
    .upload-btn:hover { background: var(--glass); color: var(--text); border-color: var(--accent); }
    .navico { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px;
              border: 1px solid var(--line); border-radius: 8px; margin-right: 6px; background: var(--glass); }
    .navico:hover { background: rgba(255,255,255,.12); }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-label { font-size: 12px; font-weight: 600; color: var(--muted); }
    .switchrow { gap: 10px; }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; flex: none; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .slider { position: absolute; inset: 0; background: rgba(120,140,175,.45); border-radius: 999px; transition: .15s; }
    .switch .slider::before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px;
      background: #fff; border-radius: 50%; transition: .15s; }
    .switch input:checked + .slider { background: var(--blue); }
    .switch input:checked + .slider::before { transform: translateX(20px); }
    #auth { font-size: 12px; color: var(--muted); width: 100%; }
    #routelink { color: var(--accent); font-weight: 600; text-decoration: none; font-size: 13px; }
    #routelink:hover { text-decoration: underline; }
    #list { display: flex; flex-direction: column; gap: 8px; }
    .zone { padding: 10px 12px; background: var(--glass); border: 1px solid var(--glass-hi); border-radius: 12px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); cursor: pointer; transition: .15s;
            box-shadow: 0 1px 0 rgba(255,255,255,.08) inset; }
    .zone:active { box-shadow: var(--glow); border-color: var(--accent); transform: translateY(1px); }
    .zone b { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-weight: 600; cursor: pointer; }
    .donebox { flex: none; width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
    .zone.done b { opacity: .55; text-decoration: line-through; }
    .zone a { font-size: 12px; color: var(--blue); text-decoration: none; margin-right: 10px; }
    .zone a:hover { text-decoration: underline; }
    .num { display: inline-flex; width: 22px; height: 22px; flex: none; align-items: center;
           justify-content: center; background: var(--accent); color: #1f2937; border-radius: 50%;
           font-size: 12px; font-weight: 700; }
    .num-icon { width: 26px; height: 26px; background: var(--accent); color: #1f2937; border-radius: 50%;
      text-align: center; font-weight: 700; line-height: 26px; box-shadow: 0 1px 4px rgba(0,0,0,.5);
      border: 2px solid #fff; cursor: pointer; }
    #map { background: var(--bg); }
    .hint { font-size: 12px; color: var(--muted); margin: 0; }
    .maplibregl-popup-content { background: var(--panel); color: var(--text); border: 1px solid var(--line);
      border-radius: 8px; box-shadow: var(--glow); padding: 7px 10px;
      display: flex; align-items: center; gap: 8px; }
    .maplibregl-popup-tip { display: none; }
    .coordtxt { color: var(--accent); font-weight: 600; white-space: nowrap; }
    .copybtn { padding: 3px 9px; font-size: 12px; border: 1px solid var(--blue); background: var(--blue);
      color: #071528; border-radius: 6px; cursor: pointer; font-weight: 700; }
    .copybtn:hover { background: #5cf7ff; }
    /* map controls: dark glass shell with cyan frame + glow, to match the panels.
       Also keeps the app's global button theme (padding/radius/border) off them. */
    .maplibregl-ctrl-group, .maplibregl-ctrl-group:not(:empty) { background: rgba(6,13,17,.92);
      border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--glow); overflow: hidden; }
    .maplibregl-ctrl button { width: 30px; height: 30px; padding: 0; border: 0; border-radius: 0; background: transparent; }
    .maplibregl-ctrl-group button + button { border-top: 1px solid var(--line); }
    .maplibregl-ctrl-group button:hover:not(:disabled) { background: var(--glass-hi); border-color: transparent; }
    /* tint maplibre's dark icons to the neon-cyan accent for contrast + theme match */
    .maplibregl-ctrl-icon { filter: invert(72%) sepia(99%) saturate(1752%) hue-rotate(151deg) brightness(101%) contrast(101%); }
    #gate { position: fixed; inset: 0; z-index: 3000; display: flex; align-items: center;
            justify-content: center; background: var(--bg); }
    /* ref look: dark card, clean even cyan glow, neon icon, cyan pill CTA */
    .gate-card { position: relative; border: 1px solid rgba(0,229,255,.2); border-radius: 16px; background: #0a0e11;
                 box-shadow: 0 0 34px rgba(0,229,255,.14), 0 24px 60px rgba(0,0,0,.6); }
    .gate-card h1 { color: var(--accent); text-shadow: 0 0 16px rgba(0,229,255,.5); }
    .gate-card #signin { background: linear-gradient(180deg, #22f0ff, #00c8d8); color: #022027;
      border: 1px solid #6ffcff; border-radius: 999px; box-shadow: var(--glow); font-weight: 700; }
    .gate-card #signin:hover { background: linear-gradient(180deg, #5cf7ff, #00e5ff); }
    .gate-card { text-align: center; max-width: 360px; padding: 40px 24px; }
    .gate-card .logo { font-size: 56px; line-height: 1; }
    .gate-card h1 { font-size: 26px; margin: 16px 0 10px; font-weight: 650; }
    .gate-card p { color: var(--muted); margin: 0 0 26px; }
    .gate-card #signin { font-size: 15px; padding: 12px 24px; }
    .gate-card .note { font-size: 12px; margin: 20px 0 0; }
    /* desktop: wrappers are invisible — children flow in the side column as before */
    .sec { display: contents; }
    #dragbar { display: none; }                       /* desktop: no split handle */
    @media (max-width: 640px) {
      body { flex-direction: column-reverse; }      /* map on top, panel below */
      #map { flex: none; height: var(--maph, 56dvh); min-height: 0; }
      #dragbar {                                      /* drag to resize map vs panel */
        display: flex; align-items: center; justify-content: center; flex: none; height: 18px;
        background: var(--panel); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
        touch-action: none; cursor: row-resize;
      }
      #dragbar::before { content: ''; width: 44px; height: 4px; border-radius: 2px; background: var(--muted); }
      #side {                                         /* panel = horizontal pager */
        width: 100%; flex: 1; height: auto; min-height: 0; padding: 0; gap: 0;
        flex-direction: row; overflow-x: auto; overflow-y: hidden;
        scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        border-left: none; border-top: 1px solid var(--line);
      }
      .sec {                                          /* each = one full-width swipe page */
        display: flex; flex-direction: column; gap: 14px;
        flex: 0 0 100%; min-width: 0; padding: 16px; overflow-y: auto;
        scroll-snap-align: start; border-right: 1px solid var(--line);
      }
      #side h1 { font-size: 16px; }
      #side h1 small { display: none; }
    }
  </style>
</head>
<body>
  <div id="gate">
    <div class="gate-card">
      <svg class="drone" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round"><circle cx="5" cy="5" r="2.2"/><circle cx="19" cy="5" r="2.2"/><circle cx="5" cy="19" r="2.2"/><circle cx="19" cy="19" r="2.2"/><path d="M6.6 6.6 9.5 9.5M17.4 6.6 14.5 9.5M6.6 17.4 9.5 14.5M17.4 17.4 14.5 14.5"/><rect x="9.3" y="9.3" width="5.4" height="5.4" rx="1.2"/></svg>
      <h1>Drone Mission Planner</h1>
      <button id="signin">Sign in with Google</button>
    </div>
  </div>
  <div id="side">
    <div class="sec">
      <h1><svg class="drone" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round"><circle cx="5" cy="5" r="2.2"/><circle cx="19" cy="5" r="2.2"/><circle cx="5" cy="19" r="2.2"/><circle cx="19" cy="19" r="2.2"/><path d="M6.6 6.6 9.5 9.5M17.4 6.6 14.5 9.5M6.6 17.4 9.5 14.5M17.4 17.4 14.5 14.5"/><rect x="9.3" y="9.3" width="5.4" height="5.4" rx="1.2"/></svg>Drone Mission Planner<small>Upload KML/KMZ · plan the scan route · navigate</small></h1>
      <div class="row">
        <input id="files" type="file" accept=".kml,.kmz" multiple hidden />
        <label for="files" class="upload-btn">⬆ Upload KML / KMZ</label>
      </div>
      <div class="field">
        <label class="field-label">Project name</label>
        <div class="row">
          <input id="mname" placeholder="project name" />
        </div>
      </div>
      <div class="row">
        <button id="save" disabled>Save mission</button>
        <select id="missions" style="display:none"></select>
        <button id="delmission" title="Delete selected mission" style="display:none">🗑</button>
      </div>
      <div class="row">
        <button id="clear">Clear all</button>
        <button id="fit">Fit</button>
        <a id="routelink" href="#" target="_blank" rel="noopener" style="display:none">▶ Full route in Google Maps</a>
      </div>
      <div class="field">
        <label class="field-label">Edit polygon</label>
        <div class="row switchrow">
          <label class="switch"><input type="checkbox" id="editverts" /><span class="slider"></span></label>
        </div>
        <div id="editctrls" style="display:none">
          <div id="editnote" class="field-label" style="margin-top:6px; display:none">Select a polygon</div>
          <div id="edittools" style="display:none">
            <div class="field-label" style="margin-top:6px">Tap a vertex:</div>
            <div class="row">
              <button id="vadd" title="Add vertex">＋</button>
              <button id="vdel" title="Remove vertex">－</button>
              <button id="vreset" title="Reset polygon">↺</button>
            </div>
            <div class="row switchrow" style="margin-top:6px">
              <label class="switch"><input type="checkbox" id="origtoggle" checked /><span class="slider"></span></label>
              <span>Show original</span>
            </div>
          </div>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Pin location</label>
        <div class="row switchrow">
          <span>Center</span>
          <label class="switch"><input type="checkbox" id="ptmode" /><span class="slider"></span></label>
          <span>Corner</span>
        </div>
      </div>
      <div class="field">
        <label class="field-label">ROI</label>
        <div class="row switchrow">
          <label class="switch"><input type="checkbox" id="roi" /><span class="slider"></span></label>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Airspace overlay</label>
        <div class="row switchrow">
          <label class="switch"><input type="checkbox" id="air-all" /><span class="slider"></span></label>
        </div>
      </div>
      <div id="list"></div>
    </div>
  </div>
  <div id="dragbar"></div>
  <div id="map"><div id="roi-note" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5; background:#04070aee; color:#00e5ff; border:1px solid #00e5ff; border-radius:8px; padding:12px 20px; font-size:16px; pointer-events:none; transition:opacity .4s">Please select a polygon</div></div>

  <script src="https://accounts.google.com/gsi/client" async></script>
  <!-- cache-bust: GitHub Pages caches app.js/geo.js for 10 min; always load the
       latest so pushes show up without a manual hard-refresh. -->
  <script type="module">import(`./app.js?v=${Date.now()}`);</script>
</body>
</html>
